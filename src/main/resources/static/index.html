<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoGrove - 구글 비전 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .upload-box { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
<h1>📸 사진 분석 테스트 페이지</h1>
<p>사진을 선택하고 분석 버튼을 눌러보세요!</p>

<div class="upload-box">
    <form action="/api/vision/analyze" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <br>
        <button type="submit">구글 AI에게 물어보기</button>
    </form>
</div>
</body>
</html>
